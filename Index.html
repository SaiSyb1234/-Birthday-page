<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday HANA ❤️</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
}

.card{
    background:white;
    padding:30px;
    border-radius:20px;
    text-align:center;
    max-width:500px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h1{
    color:#ff4081;
}

button{
    background:#ff4081;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:25px;
    cursor:pointer;
    font-size:16px;
}

#msg{
    display:none;
    margin-top:20px;
    color:#ff4081;
    font-size:20px;
}

.heart{
    position:absolute;
    font-size:20px;
    animation:float 8s linear infinite;
}

@keyframes float{
    from{
        transform:translateY(100vh);
    }
    to{
        transform:translateY(-100px);
    }
}
</style>
</head>

<body>

<div class="card">
    <h1>🎂 Happy Birthday, HANA 🎂</h1>

    <p>
        Wishing you a day full of laughter, happiness,
        cake, and everything you love. 💖
        Thank you for being such an amazing friend.
    </p>

    <button onclick="showWish()">Open Your Gift 🎁</button>

    <div id="msg">
        🌸 You are one of the most special people in my life.<br><br>
        May all your dreams come true this year! 💕✨
    </div>
</div>

<script>
function showWish(){
    document.getElementById("msg").style.display="block";
}

for(let i=0;i<25;i++){
    let heart=document.createElement("div");
    heart.className="heart";
    heart.innerHTML="💖";
    heart.style.left=Math.random()*100+"vw";
    heart.style.animationDuration=(Math.random()*5+5)+"s";
    document.body.appendChild(heart);
}
</script>

</body>
</html>
